<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png" />

    <title>Frontend Mentor | Social links profile</title>

    <link
      rel="stylesheet"
      href="style.css" />
  </head>
  <body>
    <main>
      <div class="card">
        <img
          class="card-profile-picture"
          src="assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall's photo" />
        <div class="card-main-info">
          <h1 class="card-main-info-name">Jessica Randall</h1>
          <p class="card-main-info-location">London, United Kingdom</p>
        </div>
        <p class="card-about">"Front-end developer and avid reader."</p>
        <div class="cs">
          <ul class="card-socials">
            <li class="card-socials-item">
              <a
                class="social-ref"
                href="#0"
                >GitHub</a
              >
            </li>
            <li class="card-socials-item">
              <a
                class="social-ref"
                href="#0"
                >Frontend_Mentor</a
              >
            </li>
            <li class="card-socials-item">
              <a
                class="social-ref"
                href="#0"
                >LinkedIn</a
              >
            </li>
            <li class="card-socials-item">
              <a
                class="social-ref"
                href="#0"
                >Twitter</a
              >
            </li>
            <li class="card-socials-item">
              <a
                class="social-ref"
                href="#0"
                >Instagram</a
              >
            </li>
          </ul>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. Coded by
      <a href="https://github.com/Raime-34">Raime_34</a>.
    </footer>
  </body>
</html>
