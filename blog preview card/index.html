<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32"
      href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  </head>
  <body>
    <main>
      <article class="card">
        <img class="card-img" src="assets/images/illustration-article.svg"
          alt="Abstact image">
        <div class="card-main-info">
          <p class="card-main-info-category">Learning</p>
          <time class="card-main-info-publishing-info"
            datetime="DD-MM-YYYY">Published 21 Dec 2023</time>
          <p class="card-main-info-title">HTML & CSS foundations</p>
          <p class="card-main-info-description">These languages are the backbone
            of every website, defining structure, content, and presentation.</p>
        </div>
        <footer class="card-author-info">
          <img class="card-author-info-profile-picture"
            src="assets/images/image-avatar.webp" alt="Author profile picture">
          <div class="card-author-info-name">Greg Hooper</div>
        </footer>
      </article>
    </main>
    <footer class="attribution">
      Challenge by <a
        href="https://www.frontendmentor.io?ref=challenge">Frontend
        Mentor</a>.
      Coded by <a href="https://github.com/Raime-34">Raime</a>.
    </footer>
  </body>
</html>
